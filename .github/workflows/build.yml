name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check (default features — postgres only)
        run: cargo check --workspace
      - name: cargo test
        run: cargo test --workspace

  plugin:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: cargo check (plugin-system + wit-bindgen)
        run: cargo check --features wit-bindgen
      - name: cargo test (plugin-system)
        run: cargo test --features wit-bindgen
      - name: Build test WASM fixture
        working-directory: phira-mp-plus-server/tests/test-plugin
        run: |
          cargo build --target wasm32-unknown-unknown --release
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/test_plugin.wasm \
            -o ../test-plugin.component.wasm

  plugin-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check (plugin-system + wit-bindgen)
        run: cargo check --features wit-bindgen
      - name: cargo test (plugin-system)
        run: cargo test --features wit-bindgen

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          
      - name: Setup System
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: rustup target add x86_64-unknown-linux-musl && cargo build --release --target x86_64-unknown-linux-musl --package phira-mp-plus-server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server
          path: target/x86_64-unknown-linux-musl/release/phira-mp-plus-server
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SSH_HOST: ${{ secrets.SSH_HOST || '212.64.10.35' }}
      SSH_USER: ${{ secrets.SSH_USER || 'ubuntu' }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD || 'Aa13757737593' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: phira-mp-plus-server

      - name: Deploy to server
        run: |
          sudo apt-get update -y && sudo apt-get install -y sshpass
          sshpass -p "$SSH_PASSWORD" scp -o StrictHostKeyChecking=no phira-mp-plus-server $SSH_USER@$SSH_HOST:~/Phira-mp-plus/target/release/phira-mp-plus-server
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "kill \$(pgrep -f phira-mp-plus-server) 2>/dev/null; sleep 1; cd ~/Phira-mp-plus && screen -dmS phira-mp nohup ./target/release/phira-mp-plus-server >log/server-output.log 2>&1"

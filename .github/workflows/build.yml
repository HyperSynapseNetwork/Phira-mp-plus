name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check & test (default features)
        run: |
          cargo check --workspace
          cargo test --workspace

  linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo build (default features)
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: target/release/phira-mp-plus-server

  windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo build (default features)
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: target/release/phira-mp-plus-server.exe

  plugin-linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - name: cargo build (plugin-system + wit-bindgen)
        run: cargo build --release --features wit-bindgen
      - name: cargo test (plugin-system)
        run: cargo test --features wit-bindgen
      - name: Build test WASM fixture
        working-directory: phira-mp-plus-server/tests/test-plugin
        run: |
          cargo build --target wasm32-unknown-unknown --release
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/test_plugin.wasm \
            -o ../test-plugin.component.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-plugins-linux
          path: target/release/phira-mp-plus-server

  plugin-windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo build (plugin-system + wit-bindgen)
        run: cargo build --release --features wit-bindgen
      - name: cargo test (plugin-system)
        run: cargo test --features wit-bindgen
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-plugins-windows
          path: target/release/phira-mp-plus-server.exe

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

  test:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace

  build:
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools build-essential pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target x86_64-unknown-linux-musl --package phira-mp-plus-server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: target/x86_64-unknown-linux-musl/release/phira-mp-plus-server
          if-no-files-found: error

  build-windows:
    needs: [check]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (Windows, no postgres/plugin)
        run: cargo build --release --package phira-mp-plus-server --no-default-features

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: target/release/phira-mp-plus-server.exe
          if-no-files-found: error

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo check & test
        run: |
          cargo check --workspace
          cargo test --workspace

  linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo build
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: target/release/phira-mp-plus-server

  windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: cargo build
        run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: target/release/phira-mp-plus-server.exe

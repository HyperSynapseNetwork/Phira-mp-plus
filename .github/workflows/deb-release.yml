name: Build .deb packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: jammy-amd64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            deb-arch: amd64
            artifact: phira-mp-plus-server-jammy-amd64.deb
          - name: jammy-arm64
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            deb-arch: arm64
            artifact: phira-mp-plus-server-jammy-arm64.deb
            cross: true
          - name: noble-amd64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deb-arch: amd64
            artifact: phira-mp-plus-server-noble-amd64.deb
          - name: noble-amd64v3
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            deb-arch: amd64
            artifact: phira-mp-plus-server-noble-amd64v3.deb
            rustflags: -C target-cpu=x86-64-v3
          - name: noble-arm64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            deb-arch: arm64
            artifact: phira-mp-plus-server-noble-arm64.deb
            cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.name }}
      - name: Install cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: cargo build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package .deb
        run: |
          mkdir -p pkg/usr/bin pkg/etc/phira-mp-plus pkg/lib/systemd/system
          mkdir -p pkg/DEBIAN
          cp target/${{ matrix.target }}/release/phira-mp-plus-server pkg/usr/bin/
          cp server_config.yml pkg/etc/phira-mp-plus/
          cp deploy/systemd/phira-mp-plus.service pkg/lib/systemd/system/
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys;print(json.load(sys.stdin)['packages'][0]['version'])")
          cat > pkg/DEBIAN/control << CTRL
          Package: phira-mp-plus-server
          Version: ${version}
          Section: games
          Priority: optional
          Architecture: ${{ matrix.deb-arch }}
          Maintainer: PMP Dev <dev@phira-mp-plus.dev>
          Description: Real-time multiplayer game server for Phira+
           Phira-mp+ (PMP) is the real-time multiplayer game runtime.
           It handles TCP game protocol, session management, room state
           machines, game rounds, trusted WASM plugin execution, and
           reliable event persistence.
          CTRL
          dpkg-deb --build pkg ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
      - name: Upload to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{ matrix.artifact }} --clobber

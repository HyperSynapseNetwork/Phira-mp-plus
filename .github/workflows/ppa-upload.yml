name: PPA upload

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    if: github.repository == 'HyperSynapseNetwork/Phira-mp-plus'
    steps:
      - uses: actions/checkout@v4
      - name: Import GPG key
        env:
          KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          # Import private key for signing
          echo "$KEY" | gpg --batch --import
          # Also import the public key from keyserver for verification
          gpg --keyserver keyserver.ubuntu.com --recv-keys 1B92CD21EAC1F4C1401F1F25360EE8752C12B3B1 || true
          gpg --list-keys releases@phira-mp-plus.dev
      - name: Build and sign source package
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq devscripts dpkg-dev
          dpkg-buildpackage -S -d -nc -k"releases@phira-mp-plus.dev"
          ls -la ../*.{changes,dsc}
      - name: Upload to PPA
        run: |
          sudo apt-get install -y -qq dput
          cd ..
          dput ppa:fireflyf09/phira-mp-plus phira-mp-plus-server_*.source.changes

name: PPA upload

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ppa-upload:
    runs-on: ubuntu-latest
    if: github.repository == 'HyperSynapseNetwork/Phira-mp-plus'
    steps:
      - uses: actions/checkout@v4
      - name: Import GPG key
        env:
          KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          echo "$KEY" | gpg --batch --import
          gpg --batch --list-keys --with-colons releases@phira-mp-plus.dev || echo "key not found"
      - name: Build source package
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq devscripts dpkg-dev
          dpkg-buildpackage -S -d -nc -k"releases@phira-mp-plus.dev"
      - name: Upload to PPA
        run: |
          sudo apt-get install -y -qq dput
          ls -la ../
          dput ppa:fireflyf09/phira-mp-plus ../*.changes

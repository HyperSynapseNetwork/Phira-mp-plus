name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取最新版本标签
        id: version
        run: |
          # 取最新 v*.*.* 标签
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "错误: 没有找到版本标签，请先运行 Bump Version workflow"
            exit 1
          fi
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          # 计算 C = 自 v{A}.{B}.0 以来的 commit 数
          BASE_TAG="v${MAJOR}.${MINOR}.0"
          if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
            PATCH=$(git rev-list --count "$BASE_TAG"..HEAD)
          else
            PATCH=$(git rev-list --count HEAD)
          fi

          FULL_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: 安装跨平台工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64

      - name: 添加 Windows 目标
        run: rustup target add x86_64-pc-windows-gnu

      - name: 构建 Linux 可执行文件
        run: |
          cargo build --release
          mkdir -p /tmp/release-files
          cp target/release/phira-mp-plus-server "/tmp/release-files/phira-mp-plus-server-v${{ steps.version.outputs.version }}-linux-x86_64"
          strip "/tmp/release-files/phira-mp-plus-server-v${{ steps.version.outputs.version }}-linux-x86_64"
          echo "Linux binary: $(ls -lh /tmp/release-files/phira-mp-plus-server-v${{ steps.version.outputs.version }}-linux-x86_64 | awk '{print $5}')"

      - name: 构建 Windows 可执行文件
        run: |
          cargo build --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/phira-mp-plus-server.exe "/tmp/release-files/phira-mp-plus-server-v${{ steps.version.outputs.version }}-windows-x86_64.exe"
          echo "Windows binary: $(ls -lh /tmp/release-files/phira-mp-plus-server-v${{ steps.version.outputs.version }}-windows-x86_64.exe | awk '{print $5}')"

      - name: 打包 SDK
        run: |
          mkdir -p /tmp/sdk-release/phira-plugin-sdk
          cp -r phira-plugin-sdk/src /tmp/sdk-release/phira-plugin-sdk/src
          cp phira-plugin-sdk/Cargo.toml /tmp/sdk-release/phira-plugin-sdk/
          cp -r wit /tmp/sdk-release/wit
          cd /tmp/sdk-release
          tar czf /tmp/release-files/phira-plugin-sdk.tar.gz phira-plugin-sdk wit
          echo "SDK tarball: $(ls -lh /tmp/release-files/phira-plugin-sdk.tar.gz | awk '{print $5}')"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Phira-mp+ v${{ steps.version.outputs.version }}

            ### 版本信息
            - C (patch): ${{ steps.version.outputs.patch }}
            ${{ github.event.inputs.description && '### 说明' || '' }}
            ${{ github.event.inputs.description }}

            ### 下载

            | 文件 | 平台 |
            |------|------|
            | `phira-mp-plus-server-v${{ steps.version.outputs.version }}-linux-x86_64` | Linux x86_64 |
            | `phira-mp-plus-server-v${{ steps.version.outputs.version }}-windows-x86_64.exe` | Windows x86_64 |
            | `phira-plugin-sdk.tar.gz` | 插件 SDK + WIT |

            ### SDK 使用
            ```bash
            wget ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/phira-plugin-sdk.tar.gz
            tar xzf phira-plugin-sdk.tar.gz
            ```
          files: |
            /tmp/release-files/phira-mp-plus-server-v*-linux-x86_64
            /tmp/release-files/phira-mp-plus-server-v*-windows-x86_64.exe
            /tmp/release-files/phira-plugin-sdk.tar.gz
          draft: false
          prerelease: false

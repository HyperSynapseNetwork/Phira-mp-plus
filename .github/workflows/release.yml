name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 版本号升级
        type: choice
        options:
          - patch  # C+1（默认）
          - minor  # B+1, C=0
          - major  # A+1, B=0, C=0
        default: "patch"

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 读取当前版本
        id: version
        run: |
          FULL_VERSION=$(grep '^version = ' phira-mp-plus-server/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo "$FULL_VERSION" | cut -d. -f1)
          MINOR=$(echo "$FULL_VERSION" | cut -d. -f2)
          PATCH=$(echo "$FULL_VERSION" | cut -d. -f3)

          if [[ "${{ github.event.inputs.bump }}" == "major" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "${{ github.event.inputs.bump }}" == "minor" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 更新版本号
        run: |
          # 更新主 crate 版本
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" phira-mp-plus-server/Cargo.toml
          # 更新 SDK 版本
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" phira-plugin-sdk/Cargo.toml
          # 提交版本变更
          git add phira-mp-plus-server/Cargo.toml phira-plugin-sdk/Cargo.toml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git push

      - name: 打包 SDK
        run: |
          mkdir -p /tmp/sdk-release/phira-plugin-sdk
          cp -r phira-plugin-sdk/src /tmp/sdk-release/phira-plugin-sdk/src
          cp phira-plugin-sdk/Cargo.toml /tmp/sdk-release/phira-plugin-sdk/
          cp -r wit /tmp/sdk-release/wit
          cd /tmp/sdk-release
          tar czf phira-plugin-sdk.tar.gz phira-plugin-sdk wit
          ls -lh phira-plugin-sdk.tar.gz

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Phira-mp+ v${{ steps.version.outputs.version }}

            ### 下载
            - **phira-plugin-sdk.tar.gz**: 插件 SDK + WIT 文件，用于外部 WASM 插件编译

            ### SDK 使用
            ```bash
            wget ${{ github.server_url }}/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/phira-plugin-sdk.tar.gz
            tar xzf phira-plugin-sdk.tar.gz
            ln -s phira-plugin-sdk ./phira-plugin-sdk
            ln -s wit ./wit
            ```
          files: |
            /tmp/sdk-release/phira-plugin-sdk.tar.gz
          draft: false
          prerelease: false

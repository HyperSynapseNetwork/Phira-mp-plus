name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: |
          # Cargo.toml 版本号由 auto-patch 在每次推送时自动更新，一定正确
          FULL_VERSION=$(grep '^version = ' phira-mp-plus-server/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server phira-mp-plus-server-linux
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: phira-mp-plus-server-linux

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server.exe phira-mp-plus-server-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: phira-mp-plus-server-windows.exe

  package-sdk:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 打包 SDK + WIT
        run: |
          mkdir -p _sdk
          cp -r phira-plugin-sdk _sdk/phira-plugin-sdk
          cp -r wit _sdk/wit
          cd _sdk && tar czf ../phira-plugin-sdk.tar.gz phira-plugin-sdk wit
      - uses: actions/upload-artifact@v4
        with:
          name: phira-plugin-sdk
          path: phira-plugin-sdk.tar.gz

  release:
    needs: [version, build-linux, build-windows, package-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: phira-*
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.version.outputs.tag }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ github.event.inputs.description }}
          files: |
            phira-mp-plus-server-linux
            phira-mp-plus-server-windows.exe
            phira-plugin-sdk.tar.gz
          prerelease: false

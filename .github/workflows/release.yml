name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          [[ -z "$LATEST_TAG" ]] && { echo "no version tag"; exit 1; }
          RAW="${LATEST_TAG#v}"
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2)
          BASE="v${MAJOR}.${MINOR}.0"
          if git rev-parse "$BASE" >/dev/null 2>&1; then
            PATCH=$(git rev-list --count "$BASE"..HEAD)
          else
            PATCH=$(git rev-list --count HEAD)
          fi
          echo "tag=v$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
          echo "version=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server phira-mp-plus-server-linux
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: phira-mp-plus-server-linux

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server.exe phira-mp-plus-server-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: phira-mp-plus-server-windows.exe

  build-plugins-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-tools
        run: cargo install wasm-tools
      - run: cargo build --release --features wit-bindgen
      - run: |
          cd phira-mp-plus-server/tests/test-plugin
          cargo build --target wasm32-unknown-unknown --release
          wasm-tools component new \
            target/wasm32-unknown-unknown/release/test_plugin.wasm \
            -o ../../target/release/test-plugin.component.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-plugins-linux
          path: target/release/phira-mp-plus-server

  build-plugins-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --features wit-bindgen
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-plugins-windows
          path: target/release/phira-mp-plus-server.exe

  release:
    needs: [version, build-linux, build-windows, build-plugins-linux, build-plugins-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: v${{ needs.version.outputs.version }}
          body: |
            ## Phira-mp-plus v${{ needs.version.outputs.version }}
          files: |
            phira-mp-plus-server-linux/phira-mp-plus-server-linux
            phira-mp-plus-server-windows/phira-mp-plus-server-windows.exe
            phira-mp-plus-server-plugins-linux/phira-mp-plus-server
          draft: false
          prerelease: false

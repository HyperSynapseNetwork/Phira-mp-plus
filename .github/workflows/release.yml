name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          echo "ref_type=${{ github.ref_type }} ref_name=${{ github.ref_name }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # 标签触发：直接用标签名
            FULL_VERSION="${{ github.ref_name }}"
            FULL_VERSION="${FULL_VERSION#v}"
            # 手动触发：从最新 tag 推算下一个版本号
            LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
            [[ -z "$LATEST_TAG" ]] && { echo "错误: 没有找到版本标签，请先运行 Bump Version workflow"; exit 1; }
            RAW="${LATEST_TAG#v}"
            MAJOR=$(echo "$RAW" | cut -d. -f1)
            MINOR=$(echo "$RAW" | cut -d. -f2)
            BASE="v${MAJOR}.${MINOR}.0"
            if git rev-parse "$BASE" >/dev/null 2>&1; then
              PATCH=$(git rev-list --count "$BASE"..HEAD)
            else
              PATCH=$(git rev-list --count HEAD)
            fi
            FULL_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server phira-mp-plus-server-linux
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-linux
          path: phira-mp-plus-server-linux

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - run: cp target/release/phira-mp-plus-server.exe phira-mp-plus-server-windows.exe
      - uses: actions/upload-artifact@v4
        with:
          name: phira-mp-plus-server-windows
          path: phira-mp-plus-server-windows.exe

  package-sdk:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 打包 SDK + WIT
        run: |
          mkdir -p _sdk
          cp -r phira-plugin-sdk _sdk/phira-plugin-sdk
          cp -r wit _sdk/wit
          cd _sdk && tar czf ../phira-plugin-sdk.tar.gz phira-plugin-sdk wit
      - uses: actions/upload-artifact@v4
        with:
          name: phira-plugin-sdk
          path: phira-plugin-sdk.tar.gz

  release:
    needs: [version, build-linux, build-windows, package-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: phira-*
          merge-multiple: true
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.version }}
          body: ${{ github.event.inputs.description }}
          files: |
            phira-mp-plus-server-linux
            phira-mp-plus-server-windows.exe
            phira-plugin-sdk.tar.gz
          prerelease: false

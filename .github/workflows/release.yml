name: Release

on:
  workflow_dispatch:
    inputs:
      description:
        description: 版本说明（可选）
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取最新版本标签
        id: version
        run: |
          # 取最新 v*.*.* 标签
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -1)
          if [[ -z "$LATEST_TAG" ]]; then
            echo "错误: 没有找到版本标签，请先运行 Bump Version workflow"
            exit 1
          fi
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          # 计算 C = 自 v{A}.{B}.0 以来的 commit 数
          BASE_TAG="v${MAJOR}.${MINOR}.0"
          if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
            PATCH=$(git rev-list --count "$BASE_TAG"..HEAD)
          else
            PATCH=$(git rev-list --count HEAD)
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: 打包 SDK
        run: |
          mkdir -p /tmp/sdk-release/phira-plugin-sdk
          cp -r phira-plugin-sdk/src /tmp/sdk-release/phira-plugin-sdk/src
          cp phira-plugin-sdk/Cargo.toml /tmp/sdk-release/phira-plugin-sdk/
          cp -r wit /tmp/sdk-release/wit
          cd /tmp/sdk-release
          tar czf phira-plugin-sdk.tar.gz phira-plugin-sdk wit
          echo "SDK tarball: $(ls -lh phira-plugin-sdk.tar.gz | awk '{print $5}')"

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## Phira-mp+ v${{ steps.version.outputs.version }}

            ### 版本信息
            - C (patch): ${{ steps.version.outputs.patch }}
            ${{ github.event.inputs.description && '### 说明' || '' }}
            ${{ github.event.inputs.description }}

            ### SDK 下载
            ```bash
            wget ${{ github.server_url }}/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/phira-plugin-sdk.tar.gz
            tar xzf phira-plugin-sdk.tar.gz
            ```
          files: |
            /tmp/sdk-release/phira-plugin-sdk.tar.gz
          draft: false
          prerelease: false

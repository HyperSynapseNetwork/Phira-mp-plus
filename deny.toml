[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = []

[licenses]
allow = [
    "AGPL-3.0",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
]
deny = []
copyleft = "warn"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
skip-tree = []

[sources]
unknown-registry = "deny"
allow-git = []

[advisories]
vulnerability = "deny"
unmaintained = "transitive"
notice = "transitive"
yanked = "warn"
ignore = [
    # rsa 0.9.10 — Marvin Attack, no fix available (transitive dep)
    "RUSTSEC-2023-0071",
    # fxhash — unmaintained (transitive dep)
    "RUSTSEC-2025-0057",
    # paste — unmaintained (transitive dep)
    "RUSTSEC-2024-0436",
    # rustls-pemfile — unmaintained (our direct dep for PEM parsing)
    "RUSTSEC-2025-0134",
    # lru — unsound IterMut (transitive dep)
    "RUSTSEC-2026-0002",
]

[licenses]
allow = [
    "AGPL-3.0",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
]
deny = []
copyleft = "warn"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
skip-tree = []

[sources]
unknown-registry = "deny"
allow-git = []

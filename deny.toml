[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = [
    # rsa 0.9.10 — Marvin Attack, no fix available (transitive dep)
    "RUSTSEC-2023-0071",
    # fxhash — unmaintained (transitive dep)
    "RUSTSEC-2025-0057",
    # paste — unmaintained (transitive dep)
    "RUSTSEC-2024-0436",
    # rustls-pemfile — unmaintained (our direct dep for PEM parsing)
    "RUSTSEC-2025-0134",
    # lru — unsound IterMut (transitive dep)
    "RUSTSEC-2026-0002",
    # wasmtime 32.x — 多个 CVE，已评估在受控环境下风险可控，
    # 升级到 36+ requires bindgen API 重构（HostWithStore trait），待插件系统大版本更新时统一处理
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2025-0118",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0006",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2025-0046",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0096",
    "RUSTSEC-2026-0114",
    "RUSTSEC-2026-0094",
]

[licenses]
allow = [
    "AGPL-3.0",
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "Zlib",
]
deny = []
copyleft = "warn"

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
skip-tree = []

[sources]
unknown-registry = "deny"
allow-git = []

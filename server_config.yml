# Phira-mp+ 服务端配置文件
# 所有选项均有默认值，可按需覆盖。
# 默认读取当前工作目录的 server_config.yml，也可通过 --config <FILE> 指定。
# 只有显式提供的命令行参数才覆盖同名 YAML 字段；RUST_LOG/NO_COLOR 只影响日志或终端显示。
# 完整说明见 docs/configuration.md。

# ---- 网络 ----

# TCP 监听端口（游戏客户端直连）
port: 12346

# HTTP/SSE/WebSocket 服务端口（REST API、监控面板、事件流）
http_port: 12347

# PROXY protocol 监听端口。启用后 TrustForwardedFor 中间件在此端口生效。
# 直连端口（port / http_port）不走 PROXY 解析，避免额外开销。
# 设为 0 禁用。典型值: 12344
# proxy_protocol_port: 12344

# ---- 认证 / Phira API ----

# 允许旁观的 Phira 用户 ID 列表
monitors:
  - 2

# 全局 Phira API 端点。认证默认使用它；房间未设置覆盖时，查谱面、查成绩也使用它。
# 单个房间可用 `room set <房间ID> phira_api_endpoint <url>` 临时覆盖，设置后立即生效。
phira_api_endpoint: "https://phira.5wyxi.com"

# ---- 真实网络压测（高级） ----
# Real Benchmark 是显式真实网络测试，默认不推荐。
# Simulation 不需要 token，不访问 Phira。
# 如需使用 Real Benchmark，请看 docs/benchmark-real.md。

# ---- 插件 / 数据 ----

# 插件目录路径（存放 .wasm 文件）
plugins_dir: plugins

# 扩展数据持久化 JSON 文件路径
# extensions_file: data/extensions.json

# PostgreSQL 数据库连接。配置后会启用统一结构化持久化：用户、房间快照、事件、轮次、结算、游玩时间等写入 mp_* 表。
# 未设置时仍保留旧 JSON/文件回退，方便轻量部署。
# database_url: "postgres://user:password@localhost:5432/phira_mp_plus"

# 统一 PostgreSQL 历史数据保留天数。0 表示不自动清理。
persistence_retention_days: 30

# Touches/Judges 高频遥测在 PostgreSQL 中的独立保留天数。
# 未设置时遵循 persistence_retention_days；设为 0 表示不自动清理遥测。
# touch_judge_retention_days: 7

# ---- Runtime v2 内部策略 ----

# Runtime v2 不再继续膨胀管理命令；核心开关尽量放在配置里。
# telemetry_cutover_mode 可选：direct_only / worker_preferred。
# 开发阶段推荐 direct_only；生产稳定后建议 worker_preferred。
# runtime_v2:
#   persistence_queue_capacity: 4096
#   telemetry_cutover_mode: direct_only  # direct_only (safe) | worker_preferred (direct + mirror)
#   telemetry_batcher:
#     enabled: true
#     dry_run: false
#     queue_capacity: 8192
#     max_items_per_batch: 256
#     flush_interval_ms: 1000
#   phira_http:
#     timeout_ms: 5000
#     max_retries: 3
#     base_backoff_ms: 200
#     max_backoff_ms: 3000
#     circuit_breaker:
#       enabled: true
#       failure_threshold: 8
#       open_duration_ms: 20000

# ---- 功能开关 ----

# 是否启用聊天功能
chat_enabled: true

# 是否启用交互式 TUI/CLI 管理控制台
cli_enabled: true

# ---- 房间 / 公开展示 ----

# 隐藏房间不是全局配置项，而是房间状态：
# - 房间名以 "-" 开头时默认隐藏；
# - 隐藏房间不会出现在 Web API 与欢迎语 [active_rooms] 中；
# - 可通过 room hide/unhide、room set <id> hidden true|false、WIT/API 手动管理。

# 最大房间数（不设则无限制）
# max_rooms: 100

# 每房间最大玩家数（不设则使用默认 100）
# max_users_per_room: 100

# ---- 限速 / 数据保留 ----

# 连接速率限制（每个窗口内允许的连接次数）
connection_rate_limit: 30

# 连接速率统计窗口（秒）
connection_rate_window: 10

# 轮次 Touches/Judges 数据保留天数（0 为不保留）
round_data_retention_days: 7

# ---- WASM 运行时限制 ----

# WASM 插件资源限制。一般无需修改；插件较大或事件较多时可按需调高。
# wasm_runtime:
#   max_memory_mb: 64
#   fuel_per_call: 10000000
#   max_stack_bytes: 2097152
#   http_timeout_secs: 10
#   max_http_response_bytes: 2097152
#   max_file_bytes: 4194304
#   allow_private_network: false
#   max_event_concurrency: 8

# ---- 定制 / 管理 ----

# 服务器名称（显示在欢迎语等位置）
# server_name: "My Phira Server"

# 管理员 API 令牌（预留/供管理接口或自定义扩展使用）
# admin_token: "your-secret-token"

# 游戏内管理员 Phira ID。管理员在创建房间弹窗输入 _<CLI命令> 时不会创建房间，
# 而是执行服务端 CLI 命令，并把输出通过聊天消息发回该客户端。
# 也可通过 CLI admin-id 或 WIT/host admin.* 动态维护。
admin_phira_ids: []
